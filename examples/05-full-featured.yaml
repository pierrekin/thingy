# Full-featured: all configuration options demonstrated
# Reference config showing intervals, checks, and multi-provider setup

providers:
  proxmox-prod:
    type: proxmox
    url: https://proxmox-prod.example.com:8006
    tokenId: root@pam!monitor
    tokenSecret: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    interval: 60s # default for all targets from this provider
    intervals:
      node: 10s # nodes checked more frequently
      vm: 30s # VMs use shorter interval than default
    checks:
      vm:
        state:
          state: running

  proxmox-staging:
    type: proxmox
    url: https://proxmox-staging.example.com:8006
    tokenId: root@pam!monitor
    tokenSecret: yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy
    interval: 120s # staging checked less often
    checks:
      vm:
        state: __disabled__ # don't care about staging VM state

agent:
  name: full-featured
  interval: 60s # fallback if provider doesn't specify
  targets:
    # Hypervisor nodes (use provider interval: 10s)
    - name: pve1
      provider: proxmox-prod
      type: node
      node: pve1

    - name: pve2
      provider: proxmox-prod
      type: node
      node: pve2

    # Critical VM — override to check every 5s
    - name: prod-lb
      provider: proxmox-prod
      type: vm
      vmId: 100
      interval: 5s
      checks:
        state:
          state: running

    # Standard VMs (use provider interval: 30s)
    - name: prod-web
      provider: proxmox-prod
      type: vm
      vmId: 101

    - name: prod-api
      provider: proxmox-prod
      type: vm
      vmId: 102

    # Backup VM — expected to be stopped
    - name: prod-backup
      provider: proxmox-prod
      type: vm
      vmId: 103
      checks:
        state:
          state: stopped

    # Staging (use provider interval: 120s, state checks disabled)
    - name: staging-web
      provider: proxmox-staging
      type: vm
      vmId: 200

    - name: staging-api
      provider: proxmox-staging
      type: vm
      vmId: 201
