# Monitor multiple Proxmox clusters with different credentials
# Use `type: proxmox` when the instance name doesn't match the provider name

providers:
  proxmox-prod:
    type: proxmox
    url: https://proxmox-prod.example.com:8006
    tokenId: root@pam!monitor
    tokenSecret: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    interval: 30s
    intervals:
      node: 10s

  proxmox-staging:
    type: proxmox
    url: https://proxmox-staging.example.com:8006
    tokenId: root@pam!monitor
    tokenSecret: yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy
    interval: 120s

agent:
  name: my-agent
  targets:
    - name: prod-node
      provider: proxmox-prod
      type: node
      node: pve1

    - name: prod-web
      provider: proxmox-prod
      type: vm
      vmId: 100

    - name: staging-web
      provider: proxmox-staging
      type: vm
      vmId: 200
