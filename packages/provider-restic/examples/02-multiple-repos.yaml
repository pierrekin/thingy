# Monitor multiple restic repositories with different freshness thresholds
#
# Check defaults:
#   freshness - max: 86400 (24 hours in seconds)
#
# Use provider-level `env` for shared credentials (e.g. S3 access keys)

providers:
  restic:
    env:
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

agent:
  name: my-agent
  targets:
    # Hourly backups — alert after 2 hours
    - name: db-backup
      provider: restic
      type: repo
      repository: s3:s3.amazonaws.com/backups/db
      passwordFile: /etc/restic/db-password
      host: db-server
      checks:
        freshness:
          max: 7200

    # Daily backups — default 24h threshold is fine
    - name: files-backup
      provider: restic
      type: repo
      repository: s3:s3.amazonaws.com/backups/files
      passwordFile: /etc/restic/files-password
      tags: [daily, important]

    # Weekly backups — alert after 8 days
    - name: archive-backup
      provider: restic
      type: repo
      repository: /mnt/archive
      password: archive-password
      checks:
        freshness:
          max: 691200
