name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-latest
            target: linux-aarch64
          - os: macos-latest
            target: darwin-x86_64
          - os: macos-latest
            target: darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          case "${{ matrix.target }}" in
            linux-x86_64)
              bun build packages/mantle/src/index.ts --compile --target=bun-linux-x64 --outfile=mantle-linux-x86_64
              ;;
            linux-aarch64)
              bun build packages/mantle/src/index.ts --compile --target=bun-linux-arm64 --outfile=mantle-linux-aarch64
              ;;
            darwin-x86_64)
              bun build packages/mantle/src/index.ts --compile --target=bun-darwin-x64 --outfile=mantle-darwin-x86_64
              ;;
            darwin-aarch64)
              bun build packages/mantle/src/index.ts --compile --target=bun-darwin-arm64 --outfile=mantle-darwin-aarch64
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mantle-${{ matrix.target }}
          path: mantle-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mantle-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true

