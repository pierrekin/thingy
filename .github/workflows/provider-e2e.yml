name: Provider E2E

on:
  push:
    branches: [main]
    paths:
      - "packages/provider-**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Detect changed packages
        id: detect
        run: |
          packages=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^packages/(provider-|mantle-framework)' \
            | cut -d/ -f2 \
            | sort -u \
            | paste -sd, -)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

      - name: Run provider e2e tests
        if: steps.detect.outputs.packages != ''
        run: bun run test:e2e --packages=${{ steps.detect.outputs.packages }}
