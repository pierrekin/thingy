services:
  lidarr:
    image: ${TARGET_IMAGE}:${TARGET_VERSION}
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: UTC
      LIDARR__Auth__ApiKey: e2etestapikeyfortesting12345678
    ports:
      - "8686:8686"
    healthcheck:
      test: curl -sf http://localhost:8686/ping
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
