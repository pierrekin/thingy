name: Release

on:
  push:
    tags:
      - 'v*'

run-name: Release Mantle ${{ github.ref_name }}

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: linux-x86_64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: linux-aarch64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: darwin-x86_64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: TARGET=${{ matrix.target }} OUTFILE=mantle-${{ matrix.artifact }} bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mantle-${{ matrix.artifact }}
          path: mantle-${{ matrix.artifact }}

  publish-github-release:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mantle-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true

      - name: Upload binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}

          # Install AWS CLI
          pip install awscli

          # Upload each binary to R2 with version prefix
          cd artifacts
          for file in mantle-*; do
            aws s3 cp "$file" "s3://mantle-team-mantle-binaries/releases/v${VERSION}/$file" --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Upload checksums
          aws s3 cp checksums.txt "s3://mantle-team-mantle-binaries/releases/v${VERSION}/checksums.txt" --endpoint-url "$AWS_ENDPOINT_URL"

          # Create/update latest.txt with the current version
          echo "v${VERSION}" > latest.txt
          aws s3 cp latest.txt "s3://mantle-team-mantle-binaries/latest.txt" --endpoint-url "$AWS_ENDPOINT_URL"

  publish-docker-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mantle-linux-*
          merge-multiple: true

      - name: Rename artifacts for Docker
        run: |
          mv mantle-linux-x86_64 mantle-linux-amd64
          mv mantle-linux-aarch64 mantle-linux-arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: VERSION=${GITHUB_REF#refs/tags/v} bun run docker:release
