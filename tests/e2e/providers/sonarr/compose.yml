services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_VERSION:-latest}
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: UTC
      SONARR__Auth__ApiKey: e2etestapikeyfortesting12345678
    ports:
      - "8989:8989"
    healthcheck:
      test: curl -sf http://localhost:8989/ping
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
