# Monitor a single restic backup repository
# Alerts if the latest snapshot is older than 24 hours (default)

providers:
  "@mantle/restic/repo": {}

agent:
  name: my-agent
  targets:
    - name: daily-backup
      provider: "@mantle/restic/repo"
      type: repo
      repository: /mnt/backups/server
      password: my-restic-password
